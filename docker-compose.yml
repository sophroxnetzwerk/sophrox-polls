services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    container_name: sophrox-poll-backend
    ports:
      - "3000:3000"
    environment:
      # Node Environment
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000

      # Database
      - DATABASE_URL=${DATABASE_URL:-file:./dev.db}

      # JWT Secrets (CHANGE THESE IN PRODUCTION!)
      - JWT_SECRET=${JWT_SECRET:-generate-a-random-secret-key-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-generate-a-random-refresh-secret-in-production}

      # Discord OAuth
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://localhost:5173/auth/discord}

      # Discord Bot (for role color syncing)
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_ADMIN_ID=${DISCORD_ADMIN_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}

      # CORS - Allow frontend URL only
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}

      # API Base URL (for internal use)
      - API_BASE_URL=${API_BASE_URL:-http://localhost:3000}

    volumes:
      # Persist database
      - sophrox-db:/app/prisma
    networks:
      - sophrox-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    container_name: sophrox-poll-frontend
    environment:
      # API Configuration
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:3000/api/v1}

      # Discord OAuth
      - VITE_DISCORD_CLIENT_ID=${VITE_DISCORD_CLIENT_ID}

      # Frontend URL (for redirects)
      - VITE_FRONTEND_URL=${VITE_FRONTEND_URL:-http://localhost:5173}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sophrox-network
      - reverseproxy_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  sophrox-network:
    driver: bridge
  reverseproxy_default:
    external: true

volumes:
  sophrox-db:
    driver: local
